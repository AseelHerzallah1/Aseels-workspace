# Render Blueprint — FastAPI RAG backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: grounded-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: GROQ_API_KEY
        sync: false
      - key: PERSON_NAME
        value: Aseel
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
